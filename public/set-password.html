<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Set Password | Saranga BJP Paribar</title>
  <link rel="stylesheet" href="/styles.css">
</head>

<body>
  <header class="site-header shell-header"></header>

  <main class="form-page">
    <section class="form-intro">
      <p class="eyebrow">Set Password</p>
      <h1>Create your member password</h1>
      <p>Only approved members can create a password. Your login ID is your phone number.</p>
    </section>

    <form id="set-password-form" class="panel-form">
      <label>
        Phone Number
        <input name="phone" required>
      </label>

      <label>
        New Password
        <input name="password" type="password" minlength="6" required>
      </label>

      <button class="button primary" type="submit">Create Password</button>

      <p id="set-password-status" class="form-status"></p>
    </form>
  </main>

  <footer class="footer"></footer>

  <script src="/site.js"></script>

 <script src="/set-password.js"></script>
</body>
</html>

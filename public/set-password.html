<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Set Password | Saranga BJP Paribar</title>
  <link rel="stylesheet" href="/styles.css">
</head>

<body>
  <header class="site-header shell-header"></header>

  <main class="form-page">
    <section class="form-intro">
      <p class="eyebrow">Set Password</p>
      <h1>Create your member password</h1>
      <p>Only approved members can create a password. Your login ID is your phone number.</p>
    </section>

    <form id="set-password-form" class="panel-form">
      <label>
        Phone Number
        <input name="phone" required>
      </label>

      <label>
        New Password
        <input name="password" type="password" minlength="6" required>
      </label>

      <button class="button primary" type="submit">Create Password</button>

      <p id="set-password-status" class="form-status"></p>
    </form>
  </main>

  <footer class="footer"></footer>

  <script src="/site.js"></script>

  <script>
    const form = document.querySelector('#set-password-form');
    const status = document.querySelector('#set-password-status');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      status.textContent = 'Creating password...';

      try {
        const response = await fetch('/api/member/set-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            phone: form.phone.value,
            password: form.password.value
          })
        });

        const data = await response.json();

        if (!response.ok) throw new Error(data.error);

        status.textContent = 'Password created successfully. Redirecting to login...';

        setTimeout(() => {
          window.location.href = '/member-login.html';
        }, 1200);

      } catch (error) {
        status.textContent = error.message;
      }
    });
  </script>
</body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Join Saranga BJP Paribar as a member or volunteer. Submit name, mobile number, village, occupation, and area of interest.">
    <title>Join Us | Saranga BJP Paribar</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body data-page="join">
    <div class="announcement" data-i18n="membershipAnnouncement">
  Membership and volunteer registration is open
</div>
    <header class="site-header shell-header"></header>
    <main class="form-page">
      <section class="form-intro">
  <p class="eyebrow" data-i18n="joinUs">Join Us</p>

  <h1 data-i18n="membershipHeroTitle">
    Membership and volunteer application
  </h1>

  <p data-i18n="membershipHeroText">
    Fill in your details carefully. After submission, the admin team can review and approve your application.
  </p>
</section>
      <form class="panel-form" id="membership-form" enctype="multipart/form-data">
  <div class="form-grid">
    <label>
  <span data-i18n="fullName">Full Name</span> <span class="required">*</span>
  <input name="full_name" required autocomplete="name">
<label>
  <span data-i18n="fatherSpouseName">
    Father/Spouse Name
  </span>

  <input
    name="father_or_spouse">
</label>
    <label>

  <span data-i18n="mobileNumber">
    Mobile Number
  </span>

  <span class="required">*</span>

  <input
    name="phone"
    required
    inputmode="tel"
    autocomplete="tel">

</label>
    <label>

  <span data-i18n="email">
    Email
  </span>

  <input
    name="email"
    type="email"
    autocomplete="email">

</label>
    <label>

  <span data-i18n="villageArea">
    Village/Area
  </span>

  <span class="required">*</span>

  <input
    name="village_or_ward"
    required>

</label>
    <label>

  <span data-i18n="boothNo">
    Booth No.
  </span>

  <input
    name="booth_no">

</label>
    <label>

  <span data-i18n="age">
    Age
  </span>

  <input
    name="age"
    type="number"
    min="18">

</label>
    <label>

  <span data-i18n="occupation">
    Occupation
  </span>

  <input
    name="profession">

</label>

    <label>

  <span data-i18n="interest">
    Interest
  </span>

  <span class="required">*</span>

  <select
    name="interest"
    required>

    <option value="Membership"
            data-i18n="membershipOption">

      Membership

    </option>

    <option value="Volunteer work"
            data-i18n="volunteerWorkOption">

      Volunteer work

    </option>

    <option value="Booth work"
            data-i18n="boothWorkOption">

      Booth work

    </option>

    <option value="Youth wing"
            data-i18n="youthWingOption">

      Youth wing

    </option>

    <option value="Social media"
            data-i18n="socialMediaOption">

      Social media

    </option>

    <option value="Public service"
            data-i18n="publicServiceOption">

      Public service

    </option>

  </select>

</label>

    <label>

  <span data-i18n="requestedDesignation">
    Requested Designation
  </span>

  <input
    name="designation_requested"
    placeholder="Member, Booth Worker, Coordinator">

</label>

<label>

  <span data-i18n="photoUpload">
    Photo Upload
  </span>

  <span class="required">*</span>

  <input
    type="file"
    name="image"
    accept=".jpg,.jpeg,.png,image/jpeg,image/png"
    required>

</label>
  </div>

  <label>

  <span data-i18n="fullAddress">
    Full Address
  </span>

  <span class="required">*</span>

  <textarea
    name="address"
    required
    rows="3"></textarea>

</label>
  <label>

  <span data-i18n="message">
    Message
  </span>

  <textarea
    name="message"
    rows="4"
    placeholder="Write a short note for the admin team"></textarea>

</label>

  <button class="button primary" type="submit" data-i18n="submitApplication">
  Submit Application
</button>
  <p class="form-status" id="membership-status" role="status"></p>
</form>
    </main>
    <footer class="footer"></footer>
    <a class="whatsapp-float" id="whatsapp-float" href="#" target="_blank" rel="noreferrer" data-i18n="whatsapp">
  WhatsApp
</a>
    <script src="/site.js"></script>
<script src="/membership.js"></script>
<script src="/scripts/lang.js"></script>
</body>
</html>

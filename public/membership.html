<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Join Saranga BJP Paribar as a member or volunteer. Submit name, mobile number, village, occupation, and area of interest.">
    <title>Join Us | Saranga BJP Paribar</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body data-page="join">
    <div class="announcement">Membership and volunteer registration is open</div>
    <header class="site-header shell-header"></header>
    <main class="form-page">
      <section class="form-intro">
        <p class="eyebrow">Join Us</p>
        <h1>Membership and volunteer application</h1>
        <p>Fill in your details carefully. After submission, the admin team can review and approve your application.</p>
      </section>

      <form class="panel-form" id="membership-form">
        <div class="form-grid">
          <label>Full Name<input name="full_name" required autocomplete="name"></label>
          <label>Father/Spouse Name<input name="father_or_spouse"></label>
          <label>Mobile Number<input name="phone" required inputmode="tel" autocomplete="tel"></label>
          <label>Email<input name="email" type="email" autocomplete="email"></label>
          <label>Village/Area<input name="village_or_ward" required></label>
          <label>Booth No.<input name="booth_no"></label>
          <label>Age<input name="age" type="number" min="18"></label>
          <label>Occupation<input name="profession"></label>
          <label>Interest
            <select name="interest">
              <option value="Membership">Membership</option>
              <option value="Volunteer work">Volunteer work</option>
              <option value="Booth work">Booth work</option>
              <option value="Youth wing">Youth wing</option>
              <option value="Social media">Social media</option>
              <option value="Public service">Public service</option>
            </select>
          </label>
          <label>Requested Designation<input name="designation_requested" placeholder="Member, Booth Worker, Coordinator"></label>
          <label>Photo URL<input name="image_url" placeholder="https://..."></label>
        </div>
        <label>Full Address<textarea name="address" required rows="3"></textarea></label>
        <label>Message<textarea name="message" rows="4" placeholder="Write a short note for the admin team"></textarea></label>
        <button class="button primary" type="submit">Submit Application</button>
        <p class="form-status" id="membership-status" role="status"></p>
      </form>
    </main>
    <footer class="footer"></footer>
    <a class="whatsapp-float" id="whatsapp-float" href="#" target="_blank" rel="noreferrer">WhatsApp</a>
    <script src="/site.js"></script>
    <script src="/membership.js"></script>
  </body>
</html>

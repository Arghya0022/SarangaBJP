<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login | Saranga BJP Paribar</title>
  <link rel="stylesheet" href="/styles.css">
</head>

<body>
  <header class="site-header shell-header"></header>

  <main class="form-page">
    <section class="form-intro">
      <p class="eyebrow">Admin Login</p>
      <h1>Login as Leader / Admin / President</h1>
      <p>Approved role holders can login using phone number and password.</p>
    </section>
<form id="admin-login-form" class="panel-form">

  <label>
    Phone Number
    <input type="text" name="phone" placeholder="Enter phone number" required>
  </label>

  <label>
    Password
    <input type="password" name="password" placeholder="Enter password" required>
  </label>

  <button class="button primary" type="submit">
    Login
  </button>

  <p id="admin-login-status" class="form-status"></p>

</form>
   
  </main>

  <footer class="footer"></footer>

  <script src="/site.js"></script>

  <script>
const form = document.getElementById('admin-login-form');
const status = document.getElementById('admin-login-status');

form.onsubmit = async function (event) {
  event.preventDefault();

  status.textContent = 'Checking login...';

  try {
    const response = await fetch('/api/admin/role-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        phone: form.elements.phone.value.trim(),
        password: form.elements.password.value.trim()
      })
    });

    const data = await response.json();

    if (!response.ok) {
      status.textContent = data.error || 'Login failed';
      return;
    }

    status.textContent = 'Login successful';
    window.location.href = '/admin.html';

  } catch (error) {
    status.textContent = 'Server connection error';
  }
};
</script>
</body>
</html>

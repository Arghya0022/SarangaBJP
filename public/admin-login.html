<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login | Saranga BJP Paribar</title>
  <link rel="stylesheet" href="/styles.css">
</head>

<body>
  <header class="site-header shell-header"></header>

  <main class="form-page">
    <section class="form-intro">
      <p class="eyebrow">Admin Login</p>
      <h1>Login as Leader / Admin / President</h1>
      <p>Approved role holders can login using phone number and password.</p>
    </section>

    <form id="admin-login-form" class="panel-form">
      <label>
        Phone Number
        <input name="phone" required>
      </label>

      <label>
        Password
        <input name="password" type="password" required>
      </label>

      <button class="button primary" type="submit">Login</button>

      <p id="admin-login-status" class="form-status"></p>
    </form>
  </main>

  <footer class="footer"></footer>

  <script src="/site.js"></script>

  <script>
    const form = document.querySelector('#admin-login-form');
    const status = document.querySelector('#admin-login-status');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      status.textContent = 'Logging in...';

      try {
        const response = await fetch('/api/admin/role-login', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            phone: form.phone.value,
            password: form.password.value
          })
        });

        const data = await response.json();

        if (!response.ok) throw new Error(data.error);

        status.textContent = 'Login successful';

        window.location.href = '/admin.html';

      } catch (error) {
        status.textContent = 'Login Failed';
      }
    });
  </script>
</body>
</html>

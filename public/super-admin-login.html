<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Super Admin Login | Saranga BJP Paribar</title>
  <link rel="stylesheet" href="/styles.css">
</head>

<body>
  <header class="site-header shell-header"></header>

  <main class="form-page">
    <section class="form-intro">
      <p class="eyebrow">Super Admin Login</p>
      <h1>Owner Control Panel</h1>
      <p>Only the main website owner can login here.</p>
    </section>

    <form id="super-admin-login-form" class="panel-form">
      <label>
        Phone Number
        <input name="phone" required>
      </label>

      <label>
        Password
        <input name="password" type="password" required>
      </label>

      <button class="button primary" type="submit">Login as Super Admin</button>

      <p id="super-admin-login-status" class="form-status"></p>
    </form>
 </main>

<footer class="footer"></footer>

<script src="/site.js"></script>
<script src="/super-admin-login.js"></script>
</body>
</html>

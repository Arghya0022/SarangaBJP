<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Contact Saranga BJP Paribar by phone, email, WhatsApp, social media, and office location.">
    <title>Contact | Saranga BJP Paribar</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body data-page="contact">
    <div class="announcement"
     data-i18n="contactAnnouncement">

  Connect with Saranga BJP Paribar

</div>
    <header class="site-header shell-header"></header>
    <main>
      <section class="page-hero contact-hero">

  <p class="eyebrow"
     data-i18n="contactTitle">

    Contact

  </p>

  <h1 data-i18n="contactHeroTitle">

    Reach the local organization team.

  </h1>

  <p data-i18n="contactHeroText">

    Phone, email, WhatsApp, social channels, office location, and map details can be updated from Render environment variables.

  </p>

</section>
      <section class="section contact-grid">
        <div class="contact-card"><h2 data-i18n="contactDetails">

  Contact Details

</h2><div id="contact-details"></div></div>
        <div class="contact-card"><h2 data-i18n="socialMedia">

  Social Media

</h2><div id="social-details"></div></div>
        <div class="contact-card wide"><h2 data-i18n="officeLocation">

  Office Location

</h2>
<a class="button secondary"
   id="map-link"
   href="#"
   target="_blank"
   rel="noreferrer"
   data-i18n="openGoogleMap">

  Open Google Map

</a></div>
      </section>
    </main>
    <footer class="footer"></footer>
    <a class="whatsapp-float"
   id="whatsapp-float"
   href="#"
   target="_blank"
   rel="noreferrer"
   data-i18n="whatsapp">

  WhatsApp

</a>
    <script src="/site.js"></script>
<script src="/scripts/lang.js"></script>

</body>
</html>

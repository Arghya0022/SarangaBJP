services:
  - type: web
    name: saranga-bjp-paribar
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: saranga-bjp-db
          property: connectionString
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: DONATION_UPI_ID
        sync: false
      - key: DONATION_QR_IMAGE
        sync: false

databases:
  - name: saranga-bjp-db
    plan: free
